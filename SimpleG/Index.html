<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaga Retro Clone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>GALAGA</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="448" height="512"></canvas>
        
        <!-- Touch controls for mobile -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-group">
                <div class="touch-btn" id="btnLeft">←</div>
                <div class="touch-btn" id="btnRight">→</div>
            </div>
            <div class="touch-btn" id="btnFire">A</div>
        </div>
    </div>
    
    <div class="controls">Controles: Flechas [←] [→] para mover | [Espacio] para disparar</div>

    <script src="js/game.js"></script>
</body>
</html>
